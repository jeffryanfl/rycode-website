<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" role="img" aria-label="Rycode">
  <!-- Full Rycode logo: element mark + "code" wordmark. -->
  <!-- Element mark (left) -->
  <rect x="4" y="4" width="92" height="92" rx="16" ry="16"
        fill="none" stroke="#d4a84b" stroke-width="3"/>
  <text x="13" y="25"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, 'Cascadia Mono', monospace"
        font-size="14" font-weight="600"
        fill="#d4a84b">26</text>
  <text x="50" y="76" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="54" font-weight="800"
        letter-spacing="-2"
        fill="#d4a84b">Ry</text>
  <!-- Wordmark (right) -->
  <text x="116" y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="62" font-weight="500"
        letter-spacing="-0.5"
        fill="#d4a84b">code</text>
</svg>
