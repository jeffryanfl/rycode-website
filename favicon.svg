<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rycode favicon: forged-gold rounded rectangle styled like a
       periodic-table cell. "26" in the top-left is the atomic-number
       nod (also = Est. 2026). "Ry" is the element symbol. -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb547"/>
      <stop offset="100%" stop-color="#d4a84b"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#gold)"/>
  <text x="10" y="18"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="700"
        fill="#0a0a0a" fill-opacity="0.55">26</text>
  <text x="32" y="48" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="800" fill="#0a0a0a"
        letter-spacing="-1">Ry</text>
</svg>
